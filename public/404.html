<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DevOps-Monk</title>
  <script>
    // Redirect to SPA root preserving the path
    var seg = window.location.pathname.split('/').slice(1).join('/');
    window.location.replace('/' + (seg ? '?p=/' + seg : '') + window.location.hash);
  </script>
</head>
</html>
