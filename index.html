    <title>DevOps-Monk — Abhay Pratap Singh</title>

    <script>
      // Handle GitHub Pages SPA redirect from 404.html
      (function() {
        var p = window.location.search.slice(1);
        if (p && p.indexOf('p=/') === 0) {
          window.history.replaceState(null, null, p.slice(2) + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
